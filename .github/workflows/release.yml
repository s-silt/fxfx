name: Release to PyPI

# 推送 vX.Y.Z 标签时构建并发布到 PyPI。
# 采用 PyPI Trusted Publishing（OIDC），仓库内无需任何 token / Secret。
# 一次性准备（PyPI 项目 fxapk 已存在）：
#   https://pypi.org/manage/project/fxapk/settings/publishing/ → Add a new publisher (GitHub)
#   Owner=s-silt  Repository=fxapk  Workflow=release.yml  Environment=pypi

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: build & publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing 必需
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
