name: Release to PyPI

# 推送 vX.Y.Z 标签时构建并发布到 PyPI。
# 采用 PyPI Trusted Publishing（OIDC），仓库内无需存任何 token。
# 一次性准备：在 https://pypi.org 该项目（fxapk）的 "Publishing" 设置里，
# 添加 Trusted Publisher：owner=s-silt, repo=fxapk, workflow=release.yml, environment=pypi。

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: build & publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing 必需
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
