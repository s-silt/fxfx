# 硬编码密钥检测白名单 / 形态规则（C2：jadx & SDK 常量名误报降噪）。
#
# 由 jadx / js_bundle / config_keys 三个分析器通过 registry.load_rules("secrets") 共读
# （可选；缺失时各分析器走内置兜底，离线/规则缺失不崩）。顶层为 dict，键含义：
#
#   sdk_constant_keys   : list[str]，已知 SDK 常量名（小写）。
#       ★no-false-kill（评审 HIGH 修复）：此表只在 **value 本身** 就是这些常量名时才
#       drop（如 X_APPKEY=mipush_appkey），**绝不按 key 名一票否决** —— 真 App 常把
#       真凭据放在标准键名（MIPUSH_APPKEY 等）下，按键名短路会误吞 MIPUSH_APPKEY=
#       5621543878901 这类真小米 appkey。C2 已知误报（MIPUSH_APPKEY=MIPUSH_APPKEY 等）
#       由 value==key + sdk_constant_values 覆盖，不依赖本表的键名短路。
#
#   sdk_constant_values : list[str]，已知 SDK 常量"值"（小写精确匹配 value）。
#       value 命中即视为占位/常量名，非凭据 → drop。
#
#   min_secret_len      : int，value 最小长度（与现状一致）。
#   min_distinct_chars  : int，value 去重后最少不同字符数（收紧到 4 杀掉 deviceToken 类低多样性）。
#
# 铁律：白名单只杀误报、不得误杀真凭据。真凭据形态判定用 textutil.looks_keyish
#       （纯 hex / 含 +/= / 字母数字混合）。真凭据 Abc123Xyz789Def456 /
#       xML3o7rBgL6naCbxeYS9m8 / 100215079 / GUID / 5f0a1b2c3d4e 全 looks_keyish=True。
#       本表只增不减。

# ---- 已知 SDK 常量键名（小写精确匹配 key 名）→ drop ----
sdk_constant_keys:
  - "mipush_appid"
  - "mipush_appkey"
  - "oppopush_appkey"
  - "oppopush_appsecret"
  - "oppo_appkey"
  - "oppo_appsecret"
  - "vivopush_appkey"
  - "vivopush_appid"
  - "vivo_appkey"
  - "vivo_appid"
  - "hms_appid"
  - "huawei_appid"
  - "key_device_token"
  - "method_check_appkey"
  - "meizu_appkey"
  - "meizu_appid"
  - "honor_appid"
  - "honor_appkey"
  - "fcm_token"
  - "gcm_sender_id"

# ---- 已知 SDK 常量值（小写精确匹配 value）→ drop ----
sdk_constant_values:
  - "devicetoken"
  - "dc_checkappkey"
  - "mipush_appkey"
  - "mipush_appid"
  - "oppopush_appkey"
  - "oppopush_appsecret"
  - "vivopush_appkey"
  - "key_device_token"
  - "method_check_appkey"

# ---- value 形态门槛 ----
min_secret_len: 8
min_distinct_chars: 4
