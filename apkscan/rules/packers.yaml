# 加固/加壳识别规则 — 国内主流加固厂商特征库（覆盖中文涉诈场景）。
#
# 由 apkscan.analyzers.packing 通过 registry.load_rules("packers") 读取。
# 顶层为 dict，含两个键：
#   packers : list[规则]，每条加固厂商一条
#   meta    : 全局调证文案的兜底默认（命中后写入 Lead 的 evidence_to_obtain 等）
#
# 每条 packer 规则字段：
#   name          : 加固产品名（展示用）
#   vendor        : 加固厂商主体（=调证对象，写入 Lead.subject / where_to_request）
#   so_names      : .so 库名特征（匹配 ctx.native_libs() 与 list_files() 的 basename，大小写不敏感）
#   files         : 特征文件（assets/资源等路径子串，匹配 ctx.list_files()，大小写不敏感）
#   dex_prefixes  : DEX 类名/字符串前缀或子串特征（匹配 ctx.dex_strings()，大小写敏感保留原样比较时用子串）
#   note          : 该厂商补充说明（写入 Lead.notes）
#
# 说明：加固（加壳）会把真实 DEX 加密/隐藏，静态分析拿不到完整端点/SDK/支付线索，
# 因此命中即产 HIGH Finding 提示"静态端点不完整，建议脱壳或真机动态补全"，
# 同时加固厂商本身是高价值调证目标（持有未加固原始包、实名注册、操作日志）。
#
# ★ 证据分级（分析器实现，见 packing.py）：so_names / files 匹配 = 强证据（加固运行时实证）；
#   dex_prefixes 匹配 = 弱证据（可能只是某检测/风控库内嵌的"加固名词表"字符串）。
#   判已加固（产 HIGH PACK-DETECTED + PACKER Lead + is_hardened=True）**必须该厂商至少 1 条强证据**；
#   仅 dex 名词命中 → 不判加固，降级为 LOW PACK-NAME-STRINGS-ONLY Finding（透明说明，不产脱壳建议）。

# 命中后 Lead 默认可调取证据（packer 条目可用 evidence_to_obtain 覆盖）。
meta:
  evidence_to_obtain:
    - "未加固原始安装包"
    - "开发者实名注册信息"
    - "加固/打包账号与操作日志"
  where_to_request_suffix: "（加固厂商）"

packers:
  # ---- 梆梆安全（Bangcle）-------------------------------------------------
  - name: "梆梆加固 (Bangcle)"
    vendor: "梆梆安全（北京梆梆安全科技有限公司）"
    so_names:
      - "libDexHelper.so"
      - "libDexHelper-x86.so"
      - "libsecexe.so"
      - "libsecmain.so"
      - "libSecShell.so"
      - "libSecShell-x86.so"
    files:
      - "assets/secData0.jar"
      - "assets/secData"
      - "secData0.jar"
      - "assets/bangcle_classes.jar"
      - "assets/bangcleplugin"
    dex_prefixes:
      - "com.secneo."
      - "com.bangcle."
      - "cn.com.chinatelecom.account"
    note: "梆梆为国内最早商用加固厂商之一，libDexHelper/libsecexe + secData 为其典型特征。"

  # ---- 爱加密（Ijiami）---------------------------------------------------
  - name: "爱加密 (Ijiami)"
    vendor: "爱加密（北京智游网安科技有限公司）"
    so_names:
      - "libexec.so"
      - "libexecmain.so"
      - "libijm.so"
      - "libijiami.so"
    files:
      - "assets/ijiami.dat"
      - "assets/ijiami.ajm"
      - "assets/af.bin"
      - "assets/signs.bin"
      - "ijiami.dat"
    dex_prefixes:
      - "com.shell."
      - "com.ijiami."
      - "S.MID"
    note: "爱加密典型特征为 libexec/libexecmain.so 配合 assets/ijiami.dat。"

  # ---- 360 加固保（Qihoo 360 Jiagu）-------------------------------------
  - name: "360加固保 (360 Jiagu)"
    vendor: "奇虎360（北京奇虎科技有限公司 / 360加固保）"
    so_names:
      - "libjiagu.so"
      - "libjiagu_art.so"
      - "libjiagu_x86.so"
      - "libjiagu_a64.so"
      - "libprotectClass.so"
    files:
      - "assets/libjiagu.so"
      - "assets/libjiagu_art.so"
      - "assets/libjiagu_x86.so"
      - "assets/qihoo"
    dex_prefixes:
      - "com.qihoo.util."
      - "com.stub.StubApp"
      - "com.qihoo360."
    note: "360加固以 libjiagu*.so + com.stub.StubApp 入口替换为典型特征，国内使用极广。"

  # ---- 腾讯乐固 / 御安全（Tencent Legu）---------------------------------
  - name: "腾讯乐固 (Tencent Legu)"
    vendor: "腾讯（深圳市腾讯计算机系统有限公司 / 腾讯云乐固·御安全）"
    so_names:
      - "libshell.so"
      - "libshella.so"
      - "libshellx.so"
      - "libtxshell.so"
      - "libtup.so"
      - "libnsdkmctf.so"
      - "libBugly.so"
    files:
      - "assets/libshell-super.2019.so"
      - "assets/libshella"
      - "assets/0OO00l111l1l"
      - "assets/o0oooOO0ooOo.dat"
      - "tencent_stub"
    dex_prefixes:
