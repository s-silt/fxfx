      - "com.tencent.bugly"
      - "com.tencent.tup."
    note: "腾讯乐固以 libshell/libtxshell/libtup.so 与 com.tencent.StubShell 为典型特征。"

  # ---- 娜迦 / 梆梆免费版底层（Nagain / ChaosVMP）------------------------
  - name: "娜迦加固 (Nagain / ChaosVMP)"
    vendor: "娜迦信息（北京娜迦信息科技发展有限公司）"
    so_names:
